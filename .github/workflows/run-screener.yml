name: Run Stock Screener

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy requests beautifulsoup4 pandas lxml

      - name: Run screener
        run: python scan_screener.py
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Commit and push screener.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screener.json
          git diff --staged --quiet || git commit -m "Update screener results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
