name: Update Calendar Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 6'
    - cron: '0 12 * * 0'

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --retries 5 --timeout 60 yfinance curl_cffi pandas

      - name: Fetch major economic events
        run: python fetch_economic_calendar.py

      - name: Commit and push calendar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add economic_calendar.json economic_calendar.js
          git diff --staged --quiet || git commit -m "Update calendar files"
          git pull --rebase
          git push
