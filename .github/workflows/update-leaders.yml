name: Update Liquid Leaders

on:
  # Triggered exclusively via API calls from cron-job.org (workflow_dispatch event).
  # No GitHub-native crons — those were unreliable and have been replaced by cron-job.org
  # which fires on time and respects timezones cleanly.
  workflow_dispatch:
    inputs:
      force:
        description: "Run even outside regular market hours"
        required: false
        type: boolean
        default: false

# Don't let overlapping triggers stomp on each other. If one run is still in flight
# when the next fires, the second waits for the first to finish rather than being
# cancelled. This protects commits/pushes.
concurrency:
  group: update-leaders
  cancel-in-progress: false

jobs:
  update-leaders:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check if within market hours
        id: market_check
        run: |
          export TZ="America/New_York"
          # Use 10# prefix to force base-10 interpretation; bash treats numbers with
          # leading zeros (e.g. 08, 09) as octal which breaks for those values.
          HOUR=$((10#$(date +%H)))
          MIN=$((10#$(date +%M)))
          DOW=$(date +%u)  # 1=Mon ... 7=Sun
          TIME_MIN=$((HOUR * 60 + MIN))
          TODAY=$(date +%Y-%m-%d)
          # Hardcoded NYSE full-closure dates. Source: https://www.nyse.com/trade/hours-calendars
          # Last updated: 2026-04-29 (covers through 2028). Update yearly.
          # Note: blocks ALL trigger types including workflow_dispatch — manual triggers
          # on holidays would write incorrect data so are also blocked.
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-06-19 2026-07-03 2026-09-07 2026-11-26 2026-12-25 2027-01-01 2027-01-18 2027-02-15 2027-03-26 2027-05-31 2027-06-18 2027-07-05 2027-09-06 2027-11-25 2027-12-24 2028-01-17 2028-02-21 2028-04-14 2028-05-29 2028-06-19 2028-07-04 2028-09-04 2028-11-23 2028-12-25"
          # Holiday check first — applies to all trigger types
          if echo " $HOLIDAYS " | grep -q " $TODAY "; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "US market holiday ($TODAY) — skipping"
          elif [ "$DOW" -ge 6 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Weekend ($(date '+%A %H:%M %Z')) — skipping"
          elif [ "${{ inputs.force || false }}" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Forced manual/API trigger on weekday (non-holiday) — running"
          elif [ $TIME_MIN -ge 570 ] && [ $TIME_MIN -le 961 ]; then
            # 570 = 9:30 AM ET (market open)
            # 961 = 4:01 PM ET (allow final close-adjacent cron dispatch)
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Within market hours window ($(date '+%H:%M %Z'))"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside market hours ($(date '+%H:%M %Z')) — skipping"
          fi

      - name: Checkout repo
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: pip install --retries 5 --timeout 60 yfinance numpy requests curl_cffi

      - name: Fetch Liquid Leaders data
        if: steps.market_check.outputs.skip != 'true'
        run: |
          if [ "${{ inputs.force || false }}" = "true" ]; then
            export FORCE_INTRADAY=1
          fi
          if [ -f leaders_intraday_baselines.json ]; then
            python fetch_leaders_intraday.py
          else
            echo "leaders_intraday_baselines.json missing — running one full rebuild to seed intraday baselines"
            python fetch_leaders.py
          fi

      - name: Commit and push
        if: steps.market_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in leaders.json leaders_score_history.json leaders_mcap.json leaders_index_universe.json leaders_intraday_baselines.json leaders_universe_grace.json screener_tickers.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "Update leaders.json"
          git pull --rebase
          git push
