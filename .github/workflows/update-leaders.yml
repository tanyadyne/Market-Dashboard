name: Update Liquid Leaders

on:
  schedule:
    # Every 15 minutes during US market hours (UTC)
    - cron: '*/15 13-21 * * 1-5'
  workflow_dispatch:

jobs:
  update-leaders:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check if within market hours
        id: market_check
        run: |
          export TZ="America/New_York"
          HOUR=$(date +%H)
          MIN=$(date +%M)
          TIME_MIN=$((HOUR * 60 + MIN))
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual trigger — running regardless of market hours"
          elif [ $TIME_MIN -ge 570 ] && [ $TIME_MIN -le 965 ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Within market hours ($(date '+%H:%M %Z'))"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside market hours ($(date '+%H:%M %Z')) — skipping"
          fi

      - name: Checkout repo
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: pip install "yfinance==0.2.54" numpy requests

      - name: Fetch Liquid Leaders data
        if: steps.market_check.outputs.skip != 'true'
        run: python fetch_leaders.py

      - name: Commit and push
        if: steps.market_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaders.json leaders_rank_history.json leaders_score_history.json leaders_mcap.json leaders_index_universe.json
          git diff --staged --quiet || git commit -m "Update Liquid Leaders $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
