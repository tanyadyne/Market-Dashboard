name: Repair History (one-off)

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run repair script
        run: python repair_history.py
      - name: Commit cleaned history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaders_score_history.json
          git diff --staged --quiet || git commit -m "Repair ghost history entries"
          git push
