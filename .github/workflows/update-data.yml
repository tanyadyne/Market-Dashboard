name: Update ETF Data

on:
  schedule:
    # Primary cadence: every 15 minutes during extended market hours (covers EDT + EST).
    # UTC 13:00–21:00 → ET 9:00–17:00 (summer) / 8:00–16:00 (winter). The Python market-hours
    # check below narrows to 9:30–4:05 ET.
    - cron: '*/15 13-21 * * 1-5'
    # Redundant explicit triggers at the milestones the user specifically wants covered.
    # GitHub Actions scheduled crons can be delayed or dropped under load; having multiple
    # separate cron entries increases the probability that at least one fires.
    # 15 min after US open (9:45 ET)
    - cron: '45 13,14 * * 1-5'
    # 1 hour after open (10:30 ET)
    - cron: '30 14,15 * * 1-5'
    # 2 hours after open (11:30 ET)
    - cron: '30 15,16 * * 1-5'
    # 30 min before close (3:30 ET)
    - cron: '30 19,20 * * 1-5'
    # Final post-close snapshot (4:05 ET)
    - cron: '5 20,21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check if within market hours
        id: market_check
        run: |
          export TZ="America/New_York"
          HOUR=$(date +%H)
          MIN=$(date +%M)
          TIME_MIN=$((HOUR * 60 + MIN))
          # Market: 9:30 AM (570) to 4:05 PM (965)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual trigger — running regardless of market hours"
          elif [ $TIME_MIN -ge 570 ] && [ $TIME_MIN -le 965 ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Within market hours ($(date '+%H:%M %Z'))"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside market hours ($(date '+%H:%M %Z')) — skipping"
          fi

      - name: Checkout repo
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: pip install --retries 5 --timeout 60 yfinance numpy curl_cffi

      - name: Fetch ETF data (fast refresh)
        if: steps.market_check.outputs.skip != 'true'
        run: python fetch_data.py

      - name: Commit and push data.json
        if: steps.market_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json rank_history.json
          git diff --staged --quiet || git commit -m "Update ETF data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
