name: Update ETF Data

on:
  # Triggered exclusively via API calls from cron-job.org (workflow_dispatch event).
  # No GitHub-native crons.
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check if within market hours
        id: market_check
        run: |
          export TZ="America/New_York"
          # Use 10# prefix to force base-10 interpretation
          HOUR=$((10#$(date +%H)))
          MIN=$((10#$(date +%M)))
          DOW=$(date +%u)  # 1=Mon ... 7=Sun
          TIME_MIN=$((HOUR * 60 + MIN))
          TODAY=$(date +%Y-%m-%d)
          # Hardcoded NYSE full-closure dates. Source: https://www.nyse.com/trade/hours-calendars
          # Last updated: 2026-04-29 (covers through 2028). Update yearly.
          # Note: blocks ALL trigger types including workflow_dispatch.
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-06-19 2026-07-03 2026-09-07 2026-11-26 2026-12-25 2027-01-01 2027-01-18 2027-02-15 2027-03-26 2027-05-31 2027-06-18 2027-07-05 2027-09-06 2027-11-25 2027-12-24 2028-01-17 2028-02-21 2028-04-14 2028-05-29 2028-06-19 2028-07-04 2028-09-04 2028-11-23 2028-12-25"
          # Market: 9:30 AM (570) to 4:05 PM (965)
          if echo " $HOLIDAYS " | grep -q " $TODAY "; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "US market holiday ($TODAY) — skipping"
          elif [ "$DOW" -ge 6 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Weekend ($(date '+%A %H:%M %Z')) — skipping"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual/API trigger on weekday (non-holiday) — running regardless of time of day"
          elif [ $TIME_MIN -ge 570 ] && [ $TIME_MIN -le 965 ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Within market hours ($(date '+%H:%M %Z'))"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside market hours ($(date '+%H:%M %Z')) — skipping"
          fi

      - name: Checkout repo
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: pip install --retries 5 --timeout 60 yfinance numpy curl_cffi

      - name: Fetch ETF data (fast refresh)
        if: steps.market_check.outputs.skip != 'true'
        run: python fetch_data.py

      - name: Commit and push data.json
        if: steps.market_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data_score_history.json
          git diff --staged --quiet || git commit -m "Update ETF data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
