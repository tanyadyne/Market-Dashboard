name: Resnap Last History (one-off)

on:
  workflow_dispatch:

jobs:
  resnap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run resnap script
        run: python resnap_last_history.py
      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaders_score_history.json
          git diff --staged --quiet || git commit -m "Resnap last history entry to current leaders.json"
          git push
