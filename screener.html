function getThemeRankInfo(themeName){
  // Returns {rk, total, status} for the mapped sector name, or null
  if(!ETF_DATA||!ETF_DATA.e||!themeName)return null;
  const etfs=ETF_DATA.e;
  const total=etfs.length;
  for(const e of etfs){
    if(e.n===themeName){
      const rk=e.rk||total;
      const wrk=e.w_rk||total;
      const avg=(rk+wrk)/2;
      const q=avg/total;
      let status='Mid-Range';
      if(q<=0.25)status='Leader';
      else if(q>0.75)status='Laggard';
      return {rk,total,status,avg:Math.round(avg)};
    }
  }
  return null;
}

function rsHistoryDotClass(pos){
  if(pos==='Strong Leader')return'rs-history-strong';
  if(pos==='Moderate Leader')return'rs-history-leader';
  if(pos==='Deep Laggard')return'rs-history-deep';
  if(pos==='Moderate Laggard')return'rs-history-laggard';
  return'rs-history-neutral';
}

function formatHistoryAxisDate(dt){
  const parts=(dt||'').split('-');
  if(parts.length!==3)return dt||'';
  return `${parts[2]}/${parts[1]}`;
}

function renderRSHistoryChart(dates,h,total,excluded){
  const wrArr=h&&h.wr?h.wr:[];
  const points=[];
  dates.forEach((dt,i)=>{
    const rank=wrArr[i];
    if(rank==null)return;
    const pos=getPosition(rank,total);
    points.push({dt,rank,pos,excluded:excluded&&excluded.has(dt)});
  });
  if(!points.length)return'';

  const w=760,hgt=240;
  const left=52,right=18,top=18,bottom=34;
  const plotW=w-left-right;
  const plotH=hgt-top-bottom;
  const xFor=i=>left+(points.length===1?plotW/2:(i/(points.length-1))*plotW);
  const yForRank=rank=>top+(((Math.max(1,Math.min(total,rank))-1)/Math.max(1,total-1))*plotH);
  const lineD=points.map((p,i)=>`${i?'L':'M'}${xFor(i).toFixed(1)} ${yForRank(p.rank).toFixed(1)}`).join(' ');
  const areaD=points.length>1?`${lineD} L${xFor(points.length-1).toFixed(1)} ${top+plotH} L${xFor(0).toFixed(1)} ${top+plotH} Z`:'';
  const yTicks=[
    {rank:1},
    {rank:Math.round(total*0.25)},
    {rank:Math.round(total*0.5)},
    {rank:Math.round(total*0.75)}
  ];
  const grid=yTicks.map((tick,idx)=>{
    const y=yForRank(tick.rank).toFixed(1);
    const cls=idx===2?'rs-history-midline':'rs-history-grid';
    return `<line class="${cls}" x1="${left}" y1="${y}" x2="${w-right}" y2="${y}"></line>`;
  }).join('');
  const tickCount=Math.min(5,points.length);
  const tickIdxs=[];
  for(let i=0;i<tickCount;i++){
    const idx=tickCount===1?0:Math.round(i*(points.length-1)/(tickCount-1));
    if(!tickIdxs.includes(idx))tickIdxs.push(idx);
  }
  const xTicks=tickIdxs.map(idx=>{
    const x=xFor(idx).toFixed(1);
    return `<text class="rs-history-label" x="${x}" y="${hgt-9}" text-anchor="middle">${formatHistoryAxisDate(points[idx].dt)}</text>`;
  }).join('');
  const dots=points.map((p,i)=>{
    const x=xFor(i).toFixed(1);
    const y=yForRank(p.rank).toFixed(1);
    const cls=`rs-history-dot ${rsHistoryDotClass(p.pos)}${p.excluded?' excluded':''}`;
    return `<circle class="${cls}" cx="${x}" cy="${y}" r="4"><title>${formatHistoryAxisDate(p.dt)}: rank #${p.rank}, ${p.pos}</title></circle>`;
  }).join('');

  return `<div class="rs-history-card">
    <div class="rs-history-head">
      <div class="rs-history-title">RS Rank History</div>
      <div class="rs-history-legend">
        <span><i class="rs-history-strong"></i>Strong Leader</span>
        <span><i class="rs-history-leader"></i>Moderate Leader</span>
        <span><i class="rs-history-neutral"></i>Neutral</span>
        <span><i class="rs-history-laggard"></i>Moderate Laggard</span>
        <span><i class="rs-history-deep"></i>Deep Laggard</span>
      </div>
    </div>
    <svg class="rs-history-plot" viewBox="0 0 ${w} ${hgt}" role="img" aria-label="RS rank history">
      ${grid}
      <line class="rs-history-axis" x1="${left}" y1="${top}" x2="${left}" y2="${top+plotH}"></line>
      <line class="rs-history-axis" x1="${left}" y1="${top+plotH}" x2="${w-right}" y2="${top+plotH}"></line>
      ${areaD?`<path class="rs-history-area" d="${areaD}"></path>`:''}
      ${points.length>1?`<path class="rs-history-line" d="${lineD}"></path>`:''}
      ${dots}
      ${xTicks}
    </svg>
  </div>`;
}

function searchStock(){
  const input=document.getElementById('searchInput').value.trim().toUpperCase();
  const box=document.getElementById('searchResults');
  if(input!==profileHistoryTicker){
    profileHistoryTicker=input;
    profileHistoryPage=1;
  }
  // Empty input → show landing message instead of a blank panel. This is the
  // default state when the user first opens the Individual Profile tab without
  // having clicked a ticker from RS Ranking / Overview.
  if(!input){
    box.innerHTML='<div class="profile-empty">No stock selected.<div class="profile-empty-hint">Search above, or click any ticker on the RS Ranking or Overview tab to view its profile.</div></div>';
    return;
  }
  if(!DATA){box.innerHTML='';return;}

  const stock=DATA.e.find(e=>e.t===input);
  if(!stock){box.innerHTML=`<div style="text-align:center;color:var(--t3);padding:20px">No data found for "${esc(input)}"</div>`;return;}

  const total=DATA.e.length;
  const pos=getPosition(stock.rk,total);
  const ts=stock.ts||'Mid-Range';
  // Use the full 5-tier position label (Strong Leader / Moderate Leader / Mid-Range /
  // Moderate Laggard / Deep Laggard) so the RS Score box matches the Position column in
  // the history table below.
  const rsLabel=getPosition(stock.w_rk,total);

  // Theme info (mapped sector with rank among ETFs)
  const mappedSector=stock.thm||stock.th||'';
  const themeRankInfo=getThemeRankInfo(mappedSector);
  const rankSubline=stock.w_rk!=null?`of ${DATA.e.filter(e=>e.w_rk!=null).length}`:'Unranked';
  let themeSubline;
  if(themeRankInfo){
    themeSubline=`<span class="${themeTag(themeRankInfo.status)}">${themeRankInfo.status}: #${themeRankInfo.avg} of ${themeRankInfo.total}</span>`;
  }else{
    themeSubline=`<span class="${themeTag(ts)}">${ts}</span>`;
  }

  // Info boxes — desktop: 3 separate boxes (RS Score, RS Rank, Theme).
  // Mobile: all three merge into one continuous box with floating vertical dividers
  // between each section. Achieved via the .info-pair wrapper which is transparent
  // on desktop (display:contents) and becomes a single bordered container on mobile.
  let html=`<div class="info-boxes">
    <div class="info-pair">
      <div class="info-box info-box-pair"><div class="lbl">RS Score</div><div class="val" style="color:${getRSCol(stock.w_rs)}">${stock.w_rs!=null?stock.w_rs:'—'}</div><div class="sub"><span class="${posClass(rsLabel)}">${rsLabel}</span></div></div>
      <div class="info-box info-box-pair"><div class="lbl">RS Rank</div><div class="val">#${stock.w_rk||'—'}</div><div class="sub">${rankSubline}</div></div>
      <div class="info-box info-box-pair info-box-theme"><div class="lbl">Theme</div><div class="val">${esc(mappedSector||'—')}</div><div class="sub">${themeSubline}</div></div>
    </div>
  </div>`;

  // Profile box: chart on LHS, company info on RHS
  const chgCls=chgClass(stock.ch);
  const chgTxt=stock.ch!=null?(stock.ch>=0?'+':'')+stock.ch.toFixed(2)+'%':'—';
  html+=`<div class="profile-box">
    <div class="profile-chart tv-chart" id="svc-profile-${stock.t}"></div>
    <div class="profile-info">
      <div class="profile-tk">${esc(stock.t)}</div>
      <div class="profile-name">${esc(stock.n||'')}</div>
      <div class="profile-price">$${stock.p!=null?stock.p.toFixed(2):'—'}<span class="chg ${chgCls}">${chgTxt}</span></div>
      <div class="profile-desc">${esc(stock.d||'No description available.')}</div>
    </div>
  </div>`;

  // History table with columns: DATE | Δ | SCORE | RANK | POSITION | THEME
  if(HISTORY&&HISTORY.dates&&HISTORY.d[input]){
    const h=HISTORY.d[input];
    const dates=HISTORY.dates;
    // Build the full list of rows to render: actual history dates PLUS any holiday
    // weekdays that fall between them (so users can see the gap was a holiday).
    // Each entry is {date, isHoliday}. Sorted oldest → newest.
    const rowsToRender = [];
    if(dates.length > 0){
      const firstDate = new Date(dates[0]);
      const lastDate = new Date(dates[dates.length-1]);
      const histSet = new Set(dates);
      // Walk every calendar day from first to last; emit:
      //   - actual data rows for entries in HISTORY.dates
      //   - holiday rows for weekdays that are NYSE holidays but absent from HISTORY
      const cursor = new Date(firstDate);
      while(cursor <= lastDate){
        const iso = cursor.toISOString().slice(0,10);
        if(histSet.has(iso)){
          rowsToRender.push({date:iso, isHoliday:false});
        }else{
          const dow = cursor.getUTCDay(); // 0=Sun, 6=Sat
          if(dow !== 0 && dow !== 6 && US_MARKET_HOLIDAYS.has(iso)){
            rowsToRender.push({date:iso, isHoliday:true});
          }
        }
        cursor.setUTCDate(cursor.getUTCDate() + 1);
      }
    }
    const newestRows=rowsToRender.slice().reverse();
    const totalHistoryPages=Math.max(1,Math.ceil(newestRows.length/PROFILE_HISTORY_PAGE_SIZE));
    if(profileHistoryPage>totalHistoryPages)profileHistoryPage=totalHistoryPages;
    if(profileHistoryPage<1)profileHistoryPage=1;
    const pageStart=(profileHistoryPage-1)*PROFILE_HISTORY_PAGE_SIZE;
    const pageRows=newestRows.slice(pageStart,pageStart+PROFILE_HISTORY_PAGE_SIZE);
    const tickerExcluded=getExcludedWeeklyForTicker(input);
    html+=`<div class="hist-table"><table><thead><tr>
      <th class="l">Date</th><th class="c">Rank</th><th class="c">Δ</th><th class="c">Position</th><th class="l">Theme</th>
    </tr></thead><tbody>`;
    // History table shows the WEEKLY (RS) rank now — daily ranking has been retired.
    // Build a map from date → index in HISTORY.dates for quick lookup
    const dateToIdx = {};
    dates.forEach((d,i)=>{dateToIdx[d]=i;});
    // Show newest first, paginated to keep long profile histories easy to scan.
    for(const row of pageRows){
      const dt=row.date;
      const parts=dt.split('-');
      const fmtDate=parts.length===3?`${parts[2]}/${parts[1]}/${parts[0]}`:dt;
      // Holiday placeholder row — render greyed out with no data
      if(row.isHoliday){
        html+=`<tr class="hist-row-holiday">
          <td class="l">${fmtDate} <span style="font-size:9px;font-weight:400;font-style:italic">(holiday)</span></td>
          <td class="c">—</td>
          <td class="hist-delta">—</td>
          <td class="c">—</td>
          <td class="l">—</td>
        </tr>`;
        continue;
      }
      // Real history entry
      const i=dateToIdx[dt];
      const isExcluded=tickerExcluded.has(dt);
      // Delta: compare rank with previous valid (non-excluded) day.
      // Smaller rank = better, so improvement shown green.
      let deltaHtml='<span class="fl">—</span>';
      const wr=h.wr?h.wr[i]:null;
      // Walk backward through HISTORY.dates (NOT rowsToRender) to find the most recent
      // non-excluded prior date with a valid rank. Holidays naturally aren't in
      // HISTORY.dates so this lookup correctly skips them.
      let prevIdx=i-1;
      while(prevIdx>=0 && (tickerExcluded.has(dates[prevIdx]) || (h.wr && h.wr[prevIdx]==null))){
        prevIdx--;
      }
      const wrPrev=prevIdx>=0 && h.wr ? h.wr[prevIdx] : null;
      // Don't show a Δ for excluded rows themselves (their data is being ignored).
      if(!isExcluded && wr!=null && wrPrev!=null){
        const diff=wrPrev-wr; // positive = improved (rank went down)
        if(diff>0)deltaHtml=`<span class="up">▲ +${diff}</span>`;
        else if(diff<0)deltaHtml=`<span class="dn">▼ ${diff}</span>`;
        else deltaHtml='<span class="fl">–</span>';
      }
      if(wr==null){
        html+=`<tr>
          <td class="l">${fmtDate}</td>
          <td class="c">—</td>
          <td class="hist-delta">—</td>
          <td class="c">—</td>
          <td class="l">—</td>
        </tr>`;
        continue;
      }
      const p=wr!=null?getPosition(wr,total):'—';
      // Theme column uses current theme status (history doesn't store per-day theme status)
      let themeCell=esc(mappedSector||'—');
      if(themeRankInfo){
        themeCell+=` <span class="${themeTag(themeRankInfo.status)}">(${themeRankInfo.status}: #${themeRankInfo.avg} of ${themeRankInfo.total})</span>`;
      }else{
        themeCell+=` <span class="${themeTag(ts)}">(${ts})</span>`;
      }
      const rowClass=isExcluded?' class="hist-row-excluded"':'';
      const excludedNote=isExcluded?' <span style="font-size:9px;font-weight:400;font-style:italic">(excluded)</span>':'';
      html+=`<tr${rowClass}>
        <td class="l">${fmtDate}${excludedNote}</td>
        <td class="c">${wr!=null?'#'+wr:'—'}</td>
        <td class="hist-delta">${deltaHtml}</td>
        <td class="c"><span class="${posClassFull(p)}">${p}</span></td>
        <td class="l">${themeCell}</td>
      </tr>`;
    }
    html+=`</tbody></table>`;
    if(totalHistoryPages>1){
      let pagerHtml='<div class="hist-pager">';
      for(let pNum=1;pNum<=totalHistoryPages;pNum++){
        pagerHtml+=`<button class="${pNum===profileHistoryPage?'cur':''}" onclick="setProfileHistoryPage(${pNum})">${pNum}</button>`;
      }
      pagerHtml+='</div>';
      html+=pagerHtml;
    }
    html+=`</div>`;
  }else{
    html+=`<div style="text-align:center;color:var(--t3);padding:20px;font-size:12px">No history data available yet. History builds up over multiple trading days.</div>`;
  }
  box.innerHTML=html;
  // Inject the profile TradingView chart
  injectSVCharts();
}

function setProfileHistoryPage(page){
  profileHistoryPage=page;
  searchStock();
}

async function loadData(){
  try{
    const [dataRes,histRes,etfRes]=await Promise.all([
      fetch('leaders.json?_='+Date.now()),
      fetch('leaders_score_history.json?_='+Date.now()).catch(()=>null),
      fetch('data.json?_='+Date.now()).catch(()=>null)
    ]);
    if(!dataRes.ok)throw new Error('leaders.json not found');
    DATA=await dataRes.json();
    if(histRes&&histRes.ok){try{HISTORY=await histRes.json();}catch(e){}}
    if(etfRes&&etfRes.ok){try{ETF_DATA=await etfRes.json();}catch(e){}}
    document.getElementById('statusBar').style.display='none';
    if(currentTab==='overview'){
      document.getElementById('ovPanel').style.display='grid';
      document.getElementById('si').style.display='none';
      const vt=document.getElementById('viewToggle');if(vt)vt.style.display='none';
      const fb=document.getElementById('filterBtn');if(fb)fb.style.display='none';
    }else if(currentView==='chart'&&currentTab!=='search'){
      document.getElementById('chartGrid').style.display='';
      document.getElementById('chartPagination').style.display='';
    }else if(currentTab!=='search'){
      document.getElementById('tw').style.display='block';
    }
    if(DATA.meta){
      document.getElementById('spyBar').style.display='flex';
      document.getElementById('ut').textContent=toSGT(DATA.meta.updated);
      document.getElementById('stockCount').textContent=DATA.meta.count;
    }
    buildHeader();
    if(currentTab==='overview')renderOverview();
    else if(currentView==='chart'&&currentTab!=='search')renderChartView();
    else render();
  }catch(err){
    document.getElementById('statusBar').innerHTML=`<span style="color:var(--r)">Error: ${esc(err.message)}. Run the "Update Liquid Leaders" workflow first.</span>`;
  }
}

// Auto-reload every 60s
// Keep the sticky table header below the top-fixed page header
function syncTopHeight(){
  const tf=document.querySelector('.top-fixed');
  if(!tf)return;
  const h=tf.offsetHeight;
  document.documentElement.style.setProperty('--top-h', h+'px');
}
window.addEventListener('load',syncTopHeight);
window.addEventListener('resize',syncTopHeight);
// Also re-sync after initial data load / tab switches (header height can change)
const _origLoad=loadData;
let _deepLinkHandled=false;
loadData=async function(){
  await _origLoad.apply(this,arguments);
  syncTopHeight();
  // Deep-link support: if the page was opened as screener.html?profile=TICKER
  // (e.g. from a stock-ticker click in the theme tracker), auto-open that
  // stock's Individual Profile once data is available. Only fire once — the
  // 60s auto-refresh also calls loadData() and we don't want it yanking the
  // user back to the deep-linked profile after they've navigated away.
  if(!_deepLinkHandled && DATA && DATA.e){
    _deepLinkHandled=true;
    try{
      const params=new URLSearchParams(window.location.search);
      const tk=(params.get('profile')||'').trim().toUpperCase();
      if(tk){
        // Only open if the ticker actually exists in the universe; otherwise
        // fall through to the normal landing tab.
        const exists=DATA.e.some(e=>e.t===tk);
        if(exists) openProfile(tk);
      }
    }catch(e){/* malformed URL — ignore, land normally */}
  }
};

setInterval(()=>{if(currentTab!=='search')loadData();},60000);
loadData();
</script>
