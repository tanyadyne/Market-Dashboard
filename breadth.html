<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Health</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080e1a;color:#e2e8f0;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.hdr{padding:18px 20px 14px;border-bottom:1px solid #111827;display:flex;align-items:center;gap:10px}
.btn-back{padding:4px 10px;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #1e293b;background:#0f172a;color:#94a3b8;text-decoration:none;transition:.15s;font-family:inherit}
.btn-back:hover{background:#1e293b;color:#e2e8f0}
.hdr-t{font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.content{padding:20px;max-width:1400px;margin:0 auto}

/* MA Status Cards */
.ma-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.ma-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px 20px;display:flex;flex-direction:column}
.ma-section-top{text-align:center;padding-bottom:14px}
.ma-ticker{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#e2e8f0;margin-bottom:2px}
.ma-price{font-size:12px;color:#64748b;font-family:'JetBrains Mono',monospace}

.ma-divider{height:1px;background:#1e293b;margin:0 -20px}

.ma-section-mid{padding:14px 0;display:flex;flex-direction:column;gap:6px}
.ma-row-inner{display:flex;align-items:center;gap:12px}
.ma-label{color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px;width:42px;flex-shrink:0}
.ma-dots-col{display:flex;gap:10px}
.ma-dot-group{display:flex;flex-direction:column;align-items:center;gap:3px}
.ma-dot{width:14px;height:14px;border-radius:50%;display:block}
.ma-dot.green{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.4)}
.ma-dot.red{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,0.4)}
.ma-dot.grey{background:#475569}
.ma-sublabel{font-size:7px;color:#475569;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}

.ma-section-regime{padding:14px 0;text-align:center}
.regime-text{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.regime-text.bull{color:#4ade80}
.regime-text.bear{color:#f87171}
.regime-text.neutral{color:#fbbf24}

.ma-section-dot{padding:10px 0 4px;display:flex;justify-content:center}
.big-dot{width:28px;height:28px;border-radius:50%}
.big-dot.green{background:#4ade80;box-shadow:0 0 12px rgba(74,222,128,0.5)}
.big-dot.red{background:#f87171;box-shadow:0 0 12px rgba(248,113,113,0.5)}
.big-dot.yellow{background:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.5)}

.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-full{display:grid;grid-template-columns:1fr;gap:16px}
.chart-box{background:#0f172a;border:1px solid #1e293b;border-radius:10px;overflow:hidden}
.chart-header{padding:10px 16px 6px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;font-family:'JetBrains Mono',monospace}
.chart-header span{font-size:10px;color:#475569;font-weight:500;letter-spacing:0;text-transform:none;margin-left:8px}
.chart-body{height:380px;position:relative}
.chart-body-tall{height:420px;position:relative}
.sheet-box{background:#0f172a;border:1px solid #1e293b;border-radius:10px;overflow:hidden;margin-top:16px}
.sheet-embed{width:100%;height:600px;border:none;background:#fff;border-radius:0 0 10px 10px}
.chart-body .tradingview-widget-container,
.chart-body-tall .tradingview-widget-container{height:100%!important;width:100%!important}
.chart-body .tradingview-widget-container__widget,
.chart-body-tall .tradingview-widget-container__widget{height:calc(100% - 32px)!important;width:100%!important}
@media(max-width:768px){
  .chart-row{grid-template-columns:1fr}
  .ma-row{grid-template-columns:1fr}
  .chart-body{height:300px}
  .chart-body-tall{height:340px}
  .content{padding:12px}
  .hdr{padding:12px}
  .hdr-t{font-size:12px}
}
</style>
</head>
<body>
<div class="hdr">
  <a href="index.html" class="btn-back" title="Back to Market Dashboard">←</a>
  <div class="hdr-t">Market Health</div>
</div>
<div class="content">
  <div class="ma-row" id="maCards">
    <div class="ma-card"><div class="ma-section-top"><div class="ma-ticker">SPY</div><div class="ma-price">Loading...</div></div></div>
    <div class="ma-card"><div class="ma-section-top"><div class="ma-ticker">QQQ</div><div class="ma-price">Loading...</div></div></div>
    <div class="ma-card"><div class="ma-section-top"><div class="ma-ticker">IWM</div><div class="ma-price">Loading...</div></div></div>
  </div>
  <div class="chart-row">
    <div class="chart-box">
      <div class="chart-header">Stocks above 5 SMA<span>Overbought: 90 · Oversold: 10</span></div>
      <div class="chart-body" id="chart-s5fd"></div>
    </div>
    <div class="chart-box">
      <div class="chart-header">Stocks above 50 SMA<span>Overbought: 70 · Oversold: 20</span></div>
      <div class="chart-body" id="chart-mmfi"></div>
    </div>
  </div>
  <div class="chart-full">
    <div class="chart-box">
      <div class="chart-header">Stocks above 200 SMA<span>Overbought: 70 · Oversold: 20</span></div>
      <div class="chart-body-tall" id="chart-mmth"></div>
    </div>
  </div>
  <div class="sheet-box">
    <div class="chart-header">Stockbee Market Monitor</div>
    <iframe class="sheet-embed" src="https://docs.google.com/spreadsheet/pub?key=0Am_cU8NLIU20dEhiQnVHN3Nnc3B1S3J6eGhKZFo0N3c&output=html&widget=true" frameborder="0" scrolling="yes"></iframe>
  </div>
</div>
<script>
// ─── MA Status Cards ──────────────────────────────────────
function dot(val){
  if(val===true) return '<span class="ma-dot green"></span>';
  if(val===false) return '<span class="ma-dot red"></span>';
  return '<span class="ma-dot grey"></span>';
}

function dotGroup(val, label){
  return `<div class="ma-dot-group">${dot(val)}<span class="ma-sublabel">${label}</span></div>`;
}

function renderMACards(breadth){
  const order=['SPY','QQQ','IWM'];
  const container=document.getElementById('maCards');

  container.innerHTML=order.map(tk=>{
    const d=breadth[tk];
    if(!d) return `<div class="ma-card"><div class="ma-section-top"><div class="ma-ticker">${tk}</div><div class="ma-price">No data</div></div></div>`;
    const pos=d.pos||[null,null,null];
    const slope=d.slope||[null,null,null];
    const regime=d.regime||'Neutral';
    const regimeClass=regime==='Bullish'?'bull':regime==='Bearish'?'bear':'neutral';
    const bigDotClass=regime==='Bullish'?'green':regime==='Bearish'?'red':'yellow';
    return `<div class="ma-card">
      <div class="ma-section-top">
        <div class="ma-ticker">${tk}</div>
        <div class="ma-price">$${d.price}</div>
      </div>
      <div class="ma-divider"></div>
      <div class="ma-section-mid">
        <div class="ma-row-inner">
          <div class="ma-label">Price</div>
          <div class="ma-dots-col">${dotGroup(pos[0],'9')}${dotGroup(pos[1],'21')}${dotGroup(pos[2],'50')}</div>
        </div>
        <div class="ma-row-inner">
          <div class="ma-label">Slope</div>
          <div class="ma-dots-col">${dotGroup(slope[0],'9')}${dotGroup(slope[1],'21')}${dotGroup(slope[2],'50')}</div>
        </div>
      </div>
      <div class="ma-divider"></div>
      <div class="ma-section-regime">
        <div class="regime-text ${regimeClass}">${regime.toUpperCase()}</div>
      </div>
      <div class="ma-divider"></div>
      <div class="ma-section-dot">
        <div class="big-dot ${bigDotClass}"></div>
      </div>
    </div>`;
  }).join('');
}

fetch('data.json?_='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    if(data.breadth) renderMACards(data.breadth);
  })
  .catch(()=>{});

// ─── Chart Injection ──────────────────────────────────────
function injectChart(containerId, symbol, interval){
  const el=document.getElementById(containerId);
  const wrapper=document.createElement('div');
  wrapper.className='tradingview-widget-container';
  wrapper.style.cssText='height:100%;width:100%';
  const widgetDiv=document.createElement('div');
  widgetDiv.className='tradingview-widget-container__widget';
  widgetDiv.style.cssText='height:calc(100% - 32px);width:100%';
  wrapper.appendChild(widgetDiv);
  el.appendChild(wrapper);
  const script=document.createElement('script');
  script.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.type='text/javascript';
  script.async=true;
  script.innerHTML=`
        {
          "allow_symbol_change": false,
          "calendar": false,
          "details": false,
          "hide_side_toolbar": true,
          "hide_top_toolbar": true,
          "hide_legend": true,
          "hide_volume": true,
          "hotlist": false,
          "interval": "${interval}",
          "locale": "en",
          "save_image": false,
          "style": "1",
          "symbol": "${symbol}",
          "theme": "dark",
          "timezone": "Etc/UTC",
          "backgroundColor": "#0f172a",
          "gridColor": "rgba(242, 242, 242, 0.06)",
          "watchlist": [],
          "withdateranges": false,
          "compareSymbols": [],
          "studies": [],
          "autosize": true
        }`;
  wrapper.appendChild(script);
}

injectChart('chart-s5fd','S5FD','W');
injectChart('chart-mmfi','MMFI','W');
injectChart('chart-mmth','MMTH','M');
</script>
</body>
</html>
