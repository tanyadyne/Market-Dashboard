<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Health</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8e8e8;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
body[data-theme="light"]{background:#f8fafc;color:#0f172a}
.top-fixed{position:sticky;top:0;z-index:50;background:inherit}
.hdr{padding:18px 20px 14px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:10px;background:inherit}
body[data-theme="light"] .hdr{border-bottom-color:#e2e8f0}
.btn-back{padding:4px 10px;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #1f1f1f;background:#111111;color:#888;text-decoration:none;transition:.15s;font-family:inherit}
body[data-theme="light"] .btn-back{background:#fff;border-color:#e2e8f0;color:#475569}
.btn-back:hover{background:#1f1f1f;color:#e8e8e8}
.hdr-t{font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;flex:1}
.seg-toggle{display:inline-flex;border:1px solid #1f1f1f;border-radius:6px;overflow:hidden;background:#111111}
body[data-theme="light"] .seg-toggle{border-color:#e2e8f0;background:#fff}
.seg-toggle button{padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#666;font-family:inherit;transition:.15s}
body[data-theme="light"] .seg-toggle button{color:#94a3b8}
.seg-toggle button.on{background:#1f1f1f;color:#e8e8e8}
body[data-theme="light"] .seg-toggle button.on{background:#e2e8f0;color:#0f172a}
.content{padding:20px;max-width:1400px;margin:0 auto}

/* MA Status Cards */
.ma-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.ma-card{background:#111111;border:1px solid #1f1f1f;border-radius:12px;padding:14px 0;display:flex;flex-direction:column}
.ma-top{text-align:center;padding:0 16px 12px;border-bottom:1px solid #1f1f1f}
.ma-ticker{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#e8e8e8;margin-bottom:2px}
.ma-price{font-size:12px;color:#666;font-family:'JetBrains Mono',monospace}
.ma-body{display:flex;align-items:center;padding:12px 16px;flex:1}
.ma-sec{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ma-vdiv{width:1px;background:#1f1f1f;align-self:stretch}
.ma-label{color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:9px;margin-bottom:6px}
.ma-dots-col{display:flex;gap:8px}
.ma-dot-group{display:flex;flex-direction:column;align-items:center;gap:3px}
.ma-dot{width:13px;height:13px;border-radius:50%;display:block}
.ma-dot.green{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5)}
.ma-dot.red{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5)}
.ma-dot.grey{background:#444}
.ma-sublabel{font-size:7px;color:#444;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}
.regime-text{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.regime-text.bull{color:#22c55e}
.regime-text.bear{color:#ef4444}
.regime-text.choppy{color:#fbbf24}
.big-dot{width:26px;height:26px;border-radius:50%}
.big-dot.green{background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,0.6)}
.big-dot.red{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,0.6)}
.big-dot.yellow{background:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.5)}

.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-full{display:grid;grid-template-columns:1fr;gap:16px}
.chart-box{background:#111111;border:1px solid #1f1f1f;border-radius:10px;overflow:hidden}
.chart-header{padding:10px 16px 6px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#888;font-family:'JetBrains Mono',monospace}
.chart-header span{font-size:10px;color:#444;font-weight:500;letter-spacing:0;text-transform:none;margin-left:8px}
.chart-body{height:380px;position:relative}
.chart-body-tall{height:420px;position:relative}
.sheet-box{background:#111111;border:1px solid #1f1f1f;border-radius:10px;overflow:hidden;margin-top:16px}
.sheet-embed{width:100%;height:600px;border:none;background:#fff;border-radius:0 0 10px 10px}
.chart-body .tradingview-widget-container,
.chart-body-tall .tradingview-widget-container{height:100%!important;width:100%!important}
.chart-body .tradingview-widget-container__widget,
.chart-body-tall .tradingview-widget-container__widget{height:calc(100% - 32px)!important;width:100%!important}
@media(max-width:768px){
  .chart-row{grid-template-columns:1fr}
  .ma-row{grid-template-columns:1fr}
  .chart-body{height:300px}
  .chart-body-tall{height:340px}
  .content{padding:12px}
  .hdr{padding:12px}
  .hdr-t{font-size:12px}
}
</style>
</head>
<body>
<div class="top-fixed">
<div class="hdr">
  <a href="index.html" class="btn-back" title="Back to Market Dashboard">←</a>
  <div class="hdr-t">Market Health</div>
  <div class="seg-toggle" id="themeToggle">
    <button id="themeDark" class="on" onclick="setTheme('dark')">Dark</button>
    <button id="themeLight" onclick="setTheme('light')">Light</button>
  </div>
</div>
</div>
<script>
function setTheme(theme){
  document.body.setAttribute('data-theme',theme);
  document.documentElement.setAttribute('data-theme',theme);
  try{localStorage.setItem('dashboardTheme',theme);}catch(e){}
  const d=document.getElementById('themeDark'),l=document.getElementById('themeLight');
  if(d)d.classList.toggle('on',theme==='dark');
  if(l)l.classList.toggle('on',theme==='light');
}
(function(){try{const t=localStorage.getItem('dashboardTheme')||'dark';setTheme(t);}catch(e){}})();
</script>
<div class="content">
  <div class="ma-row" id="maCards">
    <div class="ma-card"><div class="ma-top"><div class="ma-ticker">SPY</div><div class="ma-price">Loading...</div></div></div>
    <div class="ma-card"><div class="ma-top"><div class="ma-ticker">QQQ</div><div class="ma-price">Loading...</div></div></div>
    <div class="ma-card"><div class="ma-top"><div class="ma-ticker">IWM</div><div class="ma-price">Loading...</div></div></div>
  </div>
  <div class="chart-row">
    <div class="chart-box">
      <div class="chart-header">Stocks above 5 SMA<span>Overbought: 90 · Oversold: 10</span></div>
      <div class="chart-body" id="chart-s5fd"></div>
    </div>
    <div class="chart-box">
      <div class="chart-header">Stocks above 50 SMA<span>Overbought: 70 · Oversold: 20</span></div>
      <div class="chart-body" id="chart-mmfi"></div>
    </div>
  </div>
  <div class="chart-full">
    <div class="chart-box">
      <div class="chart-header">Stocks above 200 SMA<span>Overbought: 70 · Oversold: 20</span></div>
      <div class="chart-body-tall" id="chart-mmth"></div>
    </div>
  </div>
  <div class="sheet-box">
    <div class="chart-header">Stockbee Market Monitor</div>
    <iframe class="sheet-embed" src="https://docs.google.com/spreadsheet/pub?key=0Am_cU8NLIU20dEhiQnVHN3Nnc3B1S3J6eGhKZFo0N3c&output=html&widget=true" frameborder="0" scrolling="yes"></iframe>
  </div>
</div>
<script>
// ─── MA Status Cards ──────────────────────────────────────
function dot(val){
  if(val===true) return '<span class="ma-dot green"></span>';
  if(val===false) return '<span class="ma-dot red"></span>';
  return '<span class="ma-dot grey"></span>';
}

function dotGroup(val, label){
  return `<div class="ma-dot-group">${dot(val)}<span class="ma-sublabel">${label}</span></div>`;
}

function renderMACards(breadth){
  const order=['SPY','QQQ','IWM'];
  const container=document.getElementById('maCards');

  container.innerHTML=order.map(tk=>{
    const d=breadth[tk];
    if(!d) return `<div class="ma-card"><div class="ma-top"><div class="ma-ticker">${tk}</div><div class="ma-price">No data</div></div></div>`;
    const pos=d.pos||[null,null,null];
    const slope=d.slope||[null,null,null];
    const regime=d.regime||'Choppy';
    const regimeClass=regime==='Bullish'?'bull':regime==='Bearish'?'bear':'choppy';
    const bigDotClass=regime==='Bullish'?'green':regime==='Bearish'?'red':'yellow';
    return `<div class="ma-card">
      <div class="ma-top">
        <div class="ma-ticker">${tk}</div>
        <div class="ma-price">$${d.price}</div>
      </div>
      <div class="ma-body">
        <div class="ma-sec">
          <div class="ma-label">Price</div>
          <div class="ma-dots-col">${dotGroup(pos[0],'9')}${dotGroup(pos[1],'21')}${dotGroup(pos[2],'50')}</div>
          <div style="height:8px"></div>
          <div class="ma-label">Slope</div>
          <div class="ma-dots-col">${dotGroup(slope[0],'9')}${dotGroup(slope[1],'21')}${dotGroup(slope[2],'50')}</div>
        </div>
        <div class="ma-vdiv"></div>
        <div class="ma-sec">
          <div class="regime-text ${regimeClass}">${regime.toUpperCase()}</div>
        </div>
        <div class="ma-vdiv"></div>
        <div class="ma-sec">
          <div class="big-dot ${bigDotClass}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

fetch('data.json?_='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    if(data.breadth) renderMACards(data.breadth);
  })
  .catch(()=>{});

// ─── Chart Injection ──────────────────────────────────────
function injectChart(containerId, symbol, interval){
  const el=document.getElementById(containerId);
  const wrapper=document.createElement('div');
  wrapper.className='tradingview-widget-container';
  wrapper.style.cssText='height:100%;width:100%';
  const widgetDiv=document.createElement('div');
  widgetDiv.className='tradingview-widget-container__widget';
  widgetDiv.style.cssText='height:calc(100% - 32px);width:100%';
  wrapper.appendChild(widgetDiv);
  el.appendChild(wrapper);
  const script=document.createElement('script');
  script.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.type='text/javascript';
  script.async=true;
  script.innerHTML=`
        {
          "allow_symbol_change": false,
          "calendar": false,
          "details": false,
          "hide_side_toolbar": true,
          "hide_top_toolbar": true,
          "hide_legend": true,
          "hide_volume": true,
          "hotlist": false,
          "interval": "${interval}",
          "locale": "en",
          "save_image": false,
          "style": "1",
          "symbol": "${symbol}",
          "theme": "dark",
          "timezone": "Etc/UTC",
          "backgroundColor": "#111111",
          "gridColor": "rgba(242, 242, 242, 0.06)",
          "watchlist": [],
          "withdateranges": false,
          "compareSymbols": [],
          "studies": [],
          "autosize": true
        }`;
  wrapper.appendChild(script);
}

injectChart('chart-s5fd','S5FD','W');
injectChart('chart-mmfi','MMFI','W');
injectChart('chart-mmth','MMTH','M');
</script>
</body>
</html>
